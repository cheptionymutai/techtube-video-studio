# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on Commit
on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundle-cache: true

      - name: Install Jekyll and Build
        run: |
          gem install jekyll jekyll-feed jekyll-sitemap 
          echo "" >> index.html
          jekyll build

      - name: Install Firebase CLI and Force Deploy
        run: |
          npm install -g firebase-tools
          # Run deploy, capture the log, and prevent the runner from crashing immediately
          firebase deploy --only hosting --non-interactive --token "${{ secrets.FIREBASE_TOKEN }}" > deploy.log 2>&1 || true
          cat deploy.log
          
          # If the error is just the duplicate version false-alarm, pass with a green checkmark
          if grep -q "is the current active version" deploy.log; then
            echo "Firebase false-alarm detected. Site is live. Marking build as SUCCESS!"
            exit 0
          # If it's a real error, crash the build so you know about it
          elif grep -q "Error:" deploy.log; then
            echo "A real deployment error occurred."
            exit 1
          fi
