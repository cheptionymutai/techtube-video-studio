name: Deploy to Firebase Hosting on Commit
on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundle-cache: true

      - name: Install Jekyll and Build
        run: |
          gem install jekyll jekyll-feed jekyll-sitemap
          jekyll build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_TECHTUBE_VIDEO_STUDIO }}'
          channelId: live
          singleCommit: true # <-- THIS IS THE SECRET KEY: Forces Firebase to treat it as a fresh individual release instead of matching history hashes
          projectId: techtube-video-studio
