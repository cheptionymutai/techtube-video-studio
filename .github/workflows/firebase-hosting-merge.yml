name: Deploy to Firebase Hosting on Commit
on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundle-cache: true

      - name: Install Jekyll and Build
        run: |
          gem install jekyll jekyll-feed jekyll-sitemap
          jekyll build

      - name: Install Firebase CLI and Force Deploy
        run: |
          npm install -g firebase-tools
          firebase deploy --only hosting --non-interactive --token "${{ secrets.FIREBASE_TOKEN }}"
